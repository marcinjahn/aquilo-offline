# Aquilo offline server config. You normally don't hand-write this: run
#   aquilo-server learn      (one-time proxy through the real cloud), or
#   aquilo-server observe    (cloud-free; reconstruct from the live device)
# to generate it plus an initial state file. The values below document the shape.
# All topics are templated from receiver_id.

receiver_id = "ae83fc"          # the receiver/gateway id (<rid>)
sensor_id = "ae5058"            # the radio sensor-node id seen in /state
mqtt_user = "ae83fc"            # fixed MQTT username from the firmware
mqtt_pass = "00000000"          # fixed MQTT password from the firmware
firmware_version = "1.7.1.9_sh_en"  # echoed back so the device never tries an OTA
sensor_name = "ae5058"          # display name in /state

radar_skip = 9
radar_repeat = 9

bind_addr = "0.0.0.0"
listen_port = 1883
ping_interval_secs = 1200        # app-level /ping cadence (~20 min)

# Broker. Omit this section to run the embedded rumqttd broker (standalone Docker
# / dev): the device connects here directly with mqtt_user/mqtt_pass. Set it to
# connect as a CLIENT to an existing broker instead — the Home Assistant Mosquitto
# add-on does this, with these being the server's own login (the device keeps using
# mqtt_user/mqtt_pass against Mosquitto). The HA add-on fills this in automatically.
# [broker]
# host = "core-mosquitto"
# port = 1883
# username = "addons"
# password = "..."

# Persistence. The state file (history, lstEmpty baseline, last computed state,
# cached calibration) lives here and is re-seeded on startup so a reboot leaves a
# valid /state immediately. The HA add-on points this at its /data volume.
data_dir = "/data"
history_max_len = 500            # rolling reading history cap (oldest dropped)
pump_out_drop_pct = 25           # fullness drop (pct points) that counts as a pump-out

# Tank calibration. lvl is the radar distance to the surface (cm); smaller = fuller.
#   pct       = round((empty_dist - lvl) / (empty_dist - full_dist) * 100)
#   lvlToFull = round(lvl - full_dist)
# Defaults (40 / 178) reproduce the captured vendor samples; set to your tank.
[calibration]
full_dist = 40.0
empty_dist = 178.0

# Seed values for the retained /state published before the first live reading.
[state]
lvl = 150.2
pct = 20
bat = 83
days_left = 51
lvl_to_full = 110
lst_empty = "2026-05-30T00:17:19+02:00"
from = "node-4"
